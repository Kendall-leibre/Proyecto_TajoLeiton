<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios | Tajo Leitón</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --tajo-dark: #1a1d20;
            --tajo-warning: #ffc107;
        }

        .card-tajo {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .header-tajo {
            background: var(--tajo-dark);
            color: white;
            border-radius: 10px;
        }

        .table thead {
            background: var(--tajo-dark);
            color: white;
        }

        .badge-rol {
            background-color: #0dcaf0;
            color: #000;
            font-weight: bold;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-4">
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <strong th:text="${error}"></strong>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <strong th:text="${success}"></strong>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="header-tajo p-4 mb-4 d-flex justify-content-between align-items-center shadow">
            <div class="d-flex align-items-center">
                <a th:href="@{/admin_dashboard}" class="btn btn-outline-light me-3" title="Volver al Dashboard">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div>
                    <h2 class="mb-0"><i class="fas fa-hard-hat me-2 text-warning"></i> PROYECTO TAJO</h2>
                    <p class="mb-0 text-secondary">Control de Usuarios y Roles Únicos</p>
                </div>
            </div>
            <button class="btn btn-warning fw-bold shadow-sm" data-bs-toggle="modal" data-bs-target="#modalRegistro">
                <i class="fas fa-user-plus me-1"></i> NUEVO USUARIO
            </button>
        </div>

        <div class="card card-tajo overflow-hidden">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0 text-center">
                    <thead>
                        <tr>
                            <th>IDENTIFICACIÓN</th>
                            <th>NOMBRE COMPLETO</th>
                            <th>ROLES</th>
                            <th>TURNO</th>
                            <th>PLACA</th>
                            <th>ESTADO</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${listaUsuarios}">
                            <td th:text="${u.identificacion}" class="fw-bold"></td>
                            <td th:text="${u.nombre + ' ' + u.apellidoPaterno + ' ' + u.apellidoMaterno}"></td>
                            <td>
                                <div th:if="${not #lists.isEmpty(u.roles)}">
                                    <span th:each="r : ${u.roles}" th:text="${r.nombreRol}"
                                        class="badge badge-rol me-1 text-uppercase"></span>
                                </div>
                                <span th:if="${#lists.isEmpty(u.roles)}" class="text-muted small italic">Sin Rol</span>
                            </td>
                            <td>
                                <span th:each="t : ${listaTurnos}" th:if="${t.idTurno == u.idTurno}"
                                    th:text="${t.nombreTurno}"></span>
                            </td>
                            <td th:text="${u.placa != null ? u.placa : 'N/A'}"></td>
                            <td>
                                <span th:each="est : ${listaEstados}" th:if="${est.idEstado == u.idEstado.intValue()}"
                                    th:text="${est.nombreEstado}"
                                    th:class="${u.idEstado.intValue() == 1 ? 'badge bg-success' : 'badge bg-danger'}"></span>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary btn-editar"
                                    th:data-id="${u.identificacion}" th:data-nombre="${u.nombre}"
                                    th:data-ape1="${u.apellidoPaterno}" th:data-ape2="${u.apellidoMaterno}"
                                    th:data-edad="${u.edad}" th:data-turno="${u.idTurno}" th:data-placa="${u.placa}"
                                    th:data-estado="${u.idEstado}"
                                    th:data-rol-nombre="${not #lists.isEmpty(u.roles) ? u.roles[0].nombreRol : ''}"
                                    data-bs-toggle="modal" data-bs-target="#modalEditar">
                                    <i class="fas fa-pencil-alt"></i>
                                </button>
                                <a th:href="@{/admin/usuarios/eliminar/{id}(id=${u.identificacion})}"
                                    class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Seguro?');">
                                    <i class="fas fa-user-slash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalRegistro" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form th:action="@{/admin/usuarios/guardar}" method="post">
                    <div class="modal-header bg-dark text-white text-uppercase">
                        <h5 class="modal-title">Registrar Nuevo Operador</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body row g-3">
                        <div class="col-md-6"><label class="form-label fw-bold">IDENTIFICACIÓN</label><input
                                type="number" name="identificacion" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label fw-bold">NOMBRE</label><input type="text"
                                name="nombre" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label fw-bold">1° APELLIDO</label><input type="text"
                                name="apellidoPaterno" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label fw-bold">2° APELLIDO</label><input type="text"
                                name="apellidoMaterno" class="form-control" required></div>
                        <div class="col-md-3"><label class="form-label fw-bold">EDAD</label><input type="number"
                                name="edad" class="form-control" required></div>
                        <div class="col-md-5"><label class="form-label fw-bold">FECHA INGRESO</label><input type="date"
                                name="fechaIngreso" class="form-control" required></div>

                        <div class="col-md-4">
                            <label class="form-label fw-bold">TURNO</label>
                            <select name="idTurno" class="form-select" required>
                                <option th:each="t : ${listaTurnos}" th:value="${t.idTurno}" th:text="${t.nombreTurno}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">ASIGNAR ROL</label>
                            <select name="nombreRolSeleccionado" class="form-select" required>
                                <option value="" disabled selected>Seleccione un Rol...</option>
                                <option th:each="nombre : ${listaRolesUnicos}" th:value="${nombre}" th:text="${nombre}">
                                </option>
                            </select>
                            <input type="hidden" name="idRolSeleccionado" value="1">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">MAQUINARIA</label>
                            <select name="placa" class="form-select" required>
                                <option th:each="m : ${listaMaquinaria}" th:value="${m.placa}" th:text="${m.placa}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-12"><label class="form-label fw-bold">CONTRASEÑA</label><input
                                type="password" name="contrasena" class="form-control" required></div>
                    </div>
                    <div class="modal-footer"><button type="submit"
                            class="btn btn-dark w-100 fw-bold text-uppercase">Guardar Operador</button></div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form th:action="@{/admin/usuarios/editar}" method="post">
                    <div class="modal-header bg-primary text-white text-uppercase">
                        <h5 class="modal-title">Actualizar Datos Operador</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body row g-3">
                        <input type="hidden" name="identificacion" id="edit_id">
                        <div class="col-md-6"><label class="form-label fw-bold">Nombre</label><input type="text"
                                name="nombre" id="edit_nombre" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label fw-bold">1° Apellido</label><input type="text"
                                name="apellidoPaterno" id="edit_ape1" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label fw-bold">2° Apellido</label><input type="text"
                                name="apellidoMaterno" id="edit_ape2" class="form-control"></div>
                        <div class="col-md-2"><label class="form-label fw-bold">Edad</label><input type="number"
                                name="edad" id="edit_edad" class="form-control"></div>

                        <div class="col-md-4">
                            <label class="form-label fw-bold">Turno</label>
                            <select name="idTurno" id="edit_turno" class="form-select">
                                <option th:each="t : ${listaTurnos}" th:value="${t.idTurno}" th:text="${t.nombreTurno}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Cambiar Rol</label>
                            <select name="nombreRolSeleccionado" id="edit_rol_nombre" class="form-select" required>
                                <option th:each="nombre : ${listaRolesUnicos}" th:value="${nombre}" th:text="${nombre}">
                                </option>
                            </select>
                            <input type="hidden" name="idRolSeleccionado" value="1">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold">Estado</label>
                            <select name="idEstado" id="edit_estado" class="form-select">
                                <option th:each="est : ${listaEstados}" th:value="${est.idEstado}"
                                    th:text="${est.nombreEstado}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Placa</label>
                            <select name="placa" id="edit_placa" class="form-select">
                                <option th:each="m : ${listaMaquinaria}" th:value="${m.placa}" th:text="${m.placa}">
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer"><button type="submit"
                            class="btn btn-primary w-100 fw-bold text-white text-uppercase">Actualizar en Base de
                            Datos</button></div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.btn-editar').forEach(btn => {
            btn.addEventListener('click', function () {
                document.getElementById('edit_id').value = this.getAttribute('data-id');
                document.getElementById('edit_nombre').value = this.getAttribute('data-nombre');
                document.getElementById('edit_ape1').value = this.getAttribute('data-ape1');
                document.getElementById('edit_ape2').value = this.getAttribute('data-ape2');
                document.getElementById('edit_edad').value = this.getAttribute('data-edad');
                document.getElementById('edit_turno').value = this.getAttribute('data-turno');
                document.getElementById('edit_placa').value = this.getAttribute('data-placa');
                document.getElementById('edit_estado').value = this.getAttribute('data-estado');

                // Seleccionamos el nombre del rol en el combo
                let rolNombre = this.getAttribute('data-rol-nombre');
                document.getElementById('edit_rol_nombre').value = rolNombre;
            });
        });
    </script>
</body>

</html>
