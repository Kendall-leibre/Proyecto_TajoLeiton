<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Bienvenido - Tajo Leiton</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #f39c12;
            --dark: #1a1a1a;
        }

        body {
            background-color: var(--dark);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 20px;
            border: none;
            overflow: hidden;
        }

        .nav-pills .nav-link {
            color: #666;
            font-weight: bold;
            border-radius: 10px;
        }

        .nav-pills .nav-link.active {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary {
            background-color: var(--accent);
            border: none;
            font-weight: bold;
            padding: 12px;
        }

        .btn-primary:hover {
            background-color: #e67e22;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #ddd;
        }

        .brand-header {
            color: var(--accent);
            font-weight: 900;
            letter-spacing: 2px;
        }
    </style>
</head>

<body class="d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg p-4">
                    <div class="text-center mb-4">
                        <h2 class="brand-header">TAJO LEITON</h2>
                        <p class="text-muted small">Sistema de Control</p>
                    </div>

                    <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" id="tab-login" data-bs-toggle="pill"
                                data-bs-target="#form-login" type="button">Ingresar</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="tab-register" data-bs-toggle="pill"
                                data-bs-target="#form-register" type="button">Registrarse</button>
                        </li>
                    </ul>

                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="form-login">
                            <form th:action="@{/login}" method="post">
                                <div class="mb-3">
                                    <label class="form-label"><i class="fas fa-id-card me-2"></i>Identificación</label>
                                    <input type="text" name="identificacion" class="form-control" placeholder="Cédula"
                                        required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label"><i class="fas fa-lock me-2"></i>Contraseña</label>
                                    <input type="password" name="contrasena" class="form-control" placeholder="********"
                                        required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 mt-2 shadow">ENTRAR AL
                                    SISTEMA</button>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="form-register">
                            <form th:action="@{/registrar}" method="post">
                                <div class="mb-3">
                                    <label class="form-label">Cédula</label>
                                    <input type="text" name="cedula" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Nombre</label>
                                    <input type="text" name="nombre_usuario" class="form-control" required>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Primer Apellido</label>
                                        <input type="text" name="apellido_paterno" class="form-control" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Segundo Apellido</label>
                                        <input type="text" name="apellido_materno" class="form-control" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Tipo de Cliente</label>
                                    <select name="id_tipo_cliente" class="form-select" required>
                                        <option value="" selected disabled>Seleccione...</option>
                                        <option value="1">Persona Física</option>
                                        <option value="2">Empresa / Constructora</option>
                                        <option value="3">Gubernamental</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Contraseña para el sistema</label>
                                    <input type="password" name="contrasena" class="form-control" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 shadow">REGISTRARME EN EL
                                    TAJO</button>
                            </form>
                        </div>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger mt-3 text-center py-2"
                        style="font-size: 0.9rem;">
                        <i class="fas fa-exclamation-circle me-2"></i> Error en credenciales.
                    </div>

                    <div th:if="${param.registrado}" class="alert alert-success mt-3 text-center py-2"
                        style="font-size: 0.9rem;">
                        <i class="fas fa-check-circle me-2"></i> ¡Registro exitoso! Ya puedes ingresar.
                    </div>

                    <div th:if="${param.error_registro != null and param.error_registro[0] == 'duplicado'}" 
                         class="alert alert-warning mt-3 text-center py-2 shadow-sm" style="font-size: 0.9rem; border-left: 5px solid #f39c12;">
                        <i class="fas fa-id-badge me-2"></i> <strong>¡Atención!</strong> Esta identificación ya está registrada.
                    </div>

                    <div th:if="${param.error_registro != null and param.error_registro[0] == '1'}" 
                         class="alert alert-danger mt-3 text-center py-2" style="font-size: 0.9rem;">
                        <i class="fas fa-times-circle me-2"></i> Error al procesar el registro. Intente de nuevo.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Si hay un error de registro, abrimos la pestaña de registro automáticamente al recargar
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error_registro')) {
            const triggerEl = document.querySelector('#tab-register');
            if (triggerEl) {
                const registerTab = new bootstrap.Tab(triggerEl);
                registerTab.show();
            }
        }
    </script>
</body>

</html>
