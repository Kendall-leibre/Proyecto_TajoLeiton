<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Operador - Tajo Leiton</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; }
        .hero-user { background: linear-gradient(45deg, #2980b9, #3498db); color: white; border-radius: 15px; padding: 30px; }
        .btn-action { height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="hero-user shadow mb-4">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 th:text="'¡Hola, ' + ${nombre} + '!'"></h1>
                    <p>Hoy es un buen día para trabajar en el Tajo. Revisa tus turnos asignados.</p>
                </div>
                <div class="col-md-4 text-end">
                    <a th:href="@{/logout}" class="btn btn-light">Salir del Sistema</a>
                </div>
            </div>
        </div>
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm p-4">
                    <h3>Mis Acciones</h3>
                    <div class="row mt-3">
                        <div class="col-6"><button class="btn btn-primary w-100 btn-action mb-2"><i class="fas fa-sign-in-alt fa-2x mb-2"></i> Marcar Entrada</button></div>
                        <div class="col-6"><button class="btn btn-warning w-100 btn-action mb-2"><i class="fas fa-tools fa-2x mb-2"></i> Reportar Falla</button></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card border-0 shadow-sm p-4">
                    <h3>Información del Turno</h3>
                    <ul class="list-group list-group-flush mt-2">
                        <li class="list-group-item d-flex justify-content-between"><span>Estado:</span> <span class="badge bg-success">Activo</span></li>
                        <li class="list-group-item d-flex justify-content-between"><span>Placa Asignada:</span> <span class="fw-bold">BCW-452</span></li>
                        <li class="list-group-item d-flex justify-content-between"><span>Próximo Descanso:</span> <span>12:00 PM</span></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
