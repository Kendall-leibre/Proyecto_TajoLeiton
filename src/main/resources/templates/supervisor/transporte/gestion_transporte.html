<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Logística de Transporte | TAJO LEITON</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #111418;
            --accent-orange: #f39c12;
            --sidebar-width: 260px;
        }

        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', sans-serif;
        }

        .sidebar {
            background-color: var(--primary-dark);
            min-height: 100vh;
            width: var(--sidebar-width);
            position: fixed;
            color: white;
            padding: 20px;
            z-index: 1000;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
        }

        .nav-link-side {
            color: #adb5bd;
            padding: 12px 15px;
            border-radius: 8px;
            transition: 0.3s;
            margin-bottom: 5px;
            text-decoration: none;
            display: block;
        }

        .nav-link-side:hover,
        .nav-link-side.active {
            color: white;
            background: var(--accent-orange);
        }

        .card-custom {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            background: white;
            padding: 25px;
        }

        .btn-orange {
            background-color: var(--accent-orange);
            color: white;
            font-weight: 600;
            border: none;
        }
        .btn-orange:hover {
            background-color: #d68910;
        }
    </style>
</head>

<body>

    <nav class="sidebar">
        <div class="text-center mb-5">
            <h4 class="fw-bold text-warning">TAJO LEITON</h4>
            <p class="small text-muted">Módulo Supervisor</p>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link-side" th:href="@{/supervisor/dashboard}"><i
                        class="fas fa-home me-2"></i> Inicio</a></li>
            <li class="nav-item"><a class="nav-link-side" th:href="@{/supervisor/operaciones}"><i
                        class="fas fa-tasks me-2"></i> Operaciones</a></li>
            <li class="nav-item"><a class="nav-link-side active" th:href="@{/supervisor/transporte}"><i
                        class="fas fa-truck me-2"></i> Transporte</a></li>
            <hr class="opacity-25 text-white">
            <li class="nav-item"><a th:href="@{/logout}" class="nav-link-side text-danger"><i
                        class="fas fa-sign-out-alt me-2"></i> Salir</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-0">Gestión de Logística</h2>
                <p class="text-muted small">Control de fletes y despacho de unidades</p>
            </div>
            <button class="btn btn-orange shadow-sm px-4" data-bs-toggle="modal" data-bs-target="#modalNuevoTransporte">
                <i class="fas fa-plus-circle me-2"></i>Registrar Nuevo Viaje
            </button>
        </div>

        <div th:if="${mensaje}"
            th:class="'alert alert-dismissible fade show border-0 shadow-sm alert-' + (${tipo == 'success' ? 'success' : 'danger'})"
            role="alert">
            <i th:class="${tipo == 'success' ? 'fas fa-check-circle me-2' : 'fas fa-exclamation-triangle me-2'}"></i>
            <span th:text="${mensaje}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card card-custom">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Placa</th>
                            <th>Conductor</th>
                            <th>Material</th>
                            <th>Cantidad</th>
                            <th>Destino</th>
                            <th class="text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="t : ${listaTransportes}">
                            <td class="fw-bold" th:text="${t.idTransporte}"></td>
                            <td th:text="${t.placa}"></td>
                            <td th:text="${t.usuario != null ? (t.usuario.nombre + ' ' + t.usuario.apellidoPaterno + ' ' + t.usuario.apellidoMaterno) : t.identificacion}"></td>
                            <td th:text="${t.material != null ? t.material.nombre : 'S/M'}"></td>
                            <td th:text="${t.cantidadTransportada} + ' m³'"></td>
                            <td th:text="${t.destino}"></td>
                            <td class="text-center">
                                <span th:if="${t.estado != null}" th:text="${t.estado.nombreEstado}"
                                    th:class="${t.idEstado == 1 ? 'badge bg-success' : 'badge bg-warning text-dark'}"></span>
                                <span th:unless="${t.estado != null}" th:text="${t.idEstado}" class="badge bg-secondary"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="modal fade" id="modalNuevoTransporte" tabindex="-1">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content border-0">
                    <div class="modal-header bg-dark text-white">
                        <h5 class="modal-title fw-bold">Nuevo Registro de Transporte</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/admin/transporte/guardar}" method="post">
                        <div class="modal-body p-4">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold small">ID de Transporte</label>
                                    <input type="number" name="idTransporte" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold small">Placa del Vehículo</label>
                                    <select name="placa" class="form-select" required>
                                        <option value="" disabled selected>-- Seleccione Placa --</option>
                                        <option th:each="maq : ${listaMaquinaria}" th:value="${maq.placa}"
                                            th:text="${maq.placa}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold small">Conductor (Nombre Completo)</label>
                                    <select name="identificacion" class="form-select" required>
                                        <option value="" disabled selected>-- Seleccionar Chofer --</option>
                                        <option th:each="u : ${listaUsuarios}" th:value="${u.identificacion}"
                                            th:text="${u.nombre + ' ' + u.apellidoPaterno + ' ' + u.apellidoMaterno}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold small">Material Transportado</label>
                                    <select name="idMaterial" class="form-select" required>
                                        <option value="" disabled selected>-- Seleccionar Material --</option>
                                        <option th:each="m : ${listaMateriales}" th:value="${m.idMaterial}"
                                            th:text="${m.nombre}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold small">Cantidad (m³)</label>
                                    <input type="number" step="0.01" name="cantidadTransportada" class="form-control"
                                        placeholder="0.00" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold small">Precio del Flete (₡)</label>
                                    <input type="number" step="0.01" name="precioTransporte" class="form-control"
                                        placeholder="Ingrese monto" required>
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label class="form-label fw-bold small">Destino</label>
                                    <input type="text" name="destino" class="form-control" placeholder="Dirección de entrega" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold small">Estado del Viaje</label>
                                    <select name="idEstado" class="form-select" required>
                                        <option th:each="est : ${listaEstados}" th:value="${est.idEstado}"
                                            th:text="${est.nombreEstado}"></option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer border-0">
                            <button type="submit" class="btn btn-orange px-5 w-100 shadow-sm">Confirmar y Registrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
